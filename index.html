<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Water Memory Match</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">Single Player Game</p>
      <h1>Emoji Memory Match</h1>
      <p class="intro">Flip two cards at a time, find every pair, and beat your best score.</p>
    </section>

    <section class="panel" aria-label="Game status">
      <div class="stat">
        <span class="stat-label">Moves</span>
        <span class="stat-value" id="moves">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Time</span>
        <span class="stat-value" id="timer">00:00</span>
      </div>
      <div class="stat">
        <span class="stat-label">Best Score</span>
        <span class="stat-value" id="bestScore">--</span>
      </div>
      <button id="restartButton" class="restart-button" type="button">Restart Game</button>
    </section>

    <section class="board-section">
      <div id="gameBoard" class="game-board" aria-label="Memory match game board"></div>
    </section>

    <section class="message-area" aria-live="polite">
      <div id="statusMessage" class="status-message">Find all 8 pairs to win.</div>
    </section>

    <div id="confettiLayer" class="confetti-layer" aria-hidden="true"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
